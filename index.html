<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KVN SEB Portal</title>

  <link rel="stylesheet" href="./styles/index.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="./script/msal-browser.min.js"></script>
</head>
<body>

<div class="page-bg"></div>

<header class="topbar">
  <div class="brand">
    <img
      class="logo"
      src="https://erlber.github.io/seb-exam/img/logo_black_KVN_outer.png"
      alt="KVN logo"
    />
    <span class="brand-text">Kristen Videregående Skole Nordland</span>
  </div>
</header>

<main class="wrapper">
  <section class="hero">
    <div class="hero-badge">Safe Exam Browser</div>
    <h1>Velg portal</h1>
    <p>Velg riktig inngang for å starte.</p>
  </section>

  <section class="portal-grid">
    <button class="portal-card student" id="studentBtn">
      <span class="portal-title">Elevportal</span>
      <span class="portal-subtitle">Start eksamen og åpne nettressurser</span>
    </button>

    <button class="portal-card teacher" id="teacherBtn">
      <span class="portal-title">Lærerportal</span>
      <span class="portal-subtitle">Se avslutningskode og administrasjon</span>
    </button>

     <button class="portal-card quit" id="quitBtn">
        <span class="portal-title">Avslutt SEB</span>
        <span class="portal-subtitle">Lukk Safe Exam Browser</span>
    </button>
  </section>
</main>

<script>
  const isLocalDev =
    window.location.hostname === "127.0.0.1" ||
    window.location.hostname === "localhost";

  const teacherRedirectUri = isLocalDev
    ? "http://localhost:5501/teacher.html"
    : "https://erlber.github.io/seb-exam/teacher.html";

  const studentRedirectUri = isLocalDev
    ? "http://localhost:5501/student.html"
    : "https://erlber.github.io/seb-exam/student.html";

  const indexRedirectUri = isLocalDev
    ? "http://localhost:5501/index.html"
    : "https://erlber.github.io/seb-exam/";

  const msalConfig = {
    auth: {
      clientId: "2b7e1ad7-9781-4395-99b5-2e33246c6692",
      authority: "https://login.microsoftonline.com/5742a723-902a-4a88-ac5c-da38069007df",
      redirectUri: teacherRedirectUri,
      postLogoutRedirectUri: indexRedirectUri
    },
    cache: {
      cacheLocation: "localStorage"
    }
  };

  const msalInstance = new msal.PublicClientApplication(msalConfig);

  document.getElementById("studentBtn").addEventListener("click", () => {
    window.location.href = studentRedirectUri;
  });

document.getElementById("teacherBtn").addEventListener("click", async () => {
  try {
await msalInstance.loginRedirect({
  scopes: ["openid", "profile", "email"]
});
  } catch (error) {
    console.error("Login-feil:", error);
  }
});

const quitUrl = "https://kvn.no/seb/quit";

document.getElementById("quitBtn").addEventListener("click", () => {
  window.location.href = quitUrl;
});
</script>

</body>
</html>
